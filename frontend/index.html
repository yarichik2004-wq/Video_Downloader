<!DOCTYPE html>
<!--
  📁 frontend/index.html
-->
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Video Downloader</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <header class="header">
      <div class="logo">🎬</div>
      <h1>Video Downloader</h1>
      <p class="subtitle">YouTube · TikTok · Instagram</p>
    </header>

    <main>
      <div class="input-group">
        <input
          type="text"
          id="urlInput"
          placeholder="Вставь ссылку на видео..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        >
      </div>

      <div class="platforms">
        <span class="platform">▶ YouTube</span>
        <span class="platform">♪ TikTok</span>
        <span class="platform">◈ Instagram</span>
      </div>

      <button id="downloadBtn" class="btn-download">
        <span id="btnSpinner" class="spinner hidden"></span>
        <span id="btnText">Скачать</span>
      </button>

      <div id="status" class="status hidden"></div>
    </main>

    <footer class="footer">
      <p>Видео придёт в чат после скачивания</p>
    </footer>

  </div>

  <script src="app.js?v=5"></script>
</body>
</html>
