<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Downloader</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Скачать видео</h2>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Вставьте ссылку на видео...">
        </div>

        <div id="errorBubble" class="error-bubble hidden">
            Не удалось распознать ссылку (YouTube, TikTok, Insta)
        </div>

        <button id="downloadBtn" class="download-btn hidden">
            <span id="btnSpinner" class="spinner hidden"></span>
            <span id="btnText">Скачать</span>
        </button>

        <div id="status" class="status hidden"></div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
</body>
</html>
